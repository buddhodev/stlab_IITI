<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="100%" height="100%">
  <defs>
    <!-- Sky & Lab Indoor Lighting Gradients -->
    <linearGradient id="lab-bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eaeff5" />
      <stop offset="40%" stop-color="#dbe3eb" />
      <stop offset="100%" stop-color="#b8c8d6" />
    </linearGradient>
    <linearGradient id="warm-glow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff9e6" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#e6f2ff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#e2f5e5" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="glass-reflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="sticker-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e4a7c" />
      <stop offset="100%" stop-color="#072b49" />
    </linearGradient>
  </defs>

  <!-- 1. Background - Inside the Lab (Blurred/Layered) -->
  <rect width="1200" height="900" fill="url(#lab-bg-gradient)" />
  
  <!-- Ambient Indoor Warm Lighting Glow -->
  <rect width="1200" height="900" fill="url(#warm-glow)" />

  <!-- Simplified Lab Benches and Equipment silhouettes in the background -->
  <g opacity="0.45" transform="translate(0, 150)">
    <!-- Back wall structures and storage cabinets -->
    <rect x="50" y="50" width="300" height="450" fill="#a4b7c9" rx="8" />
    <line x1="200" y1="50" x2="200" y2="500" stroke="#ffffff" stroke-width="3" />
    <rect x="100" y="100" width="80" height="60" fill="#cbd6e0" />
    <rect x="220" y="100" width="80" height="60" fill="#cbd6e0" />

    <!-- A refrigerator unit on the left -->
    <rect x="50" y="250" width="180" height="400" fill="#ced9e3" rx="10" stroke="#90a4b7" stroke-width="4" />
    <line x1="230" y1="250" x2="230" y2="650" stroke="#7e95ab" stroke-width="2" />
    <rect x="70" y="280" width="20" height="80" fill="#ffffff" rx="4" />

    <!-- Center Lab Table Structure -->
    <rect x="420" y="280" width="460" height="380" fill="#445c73" rx="4" />
    <!-- Table supports -->
    <rect x="440" y="660" width="30" height="150" fill="#1e2c38" />
    <rect x="830" y="660" width="30" height="150" fill="#1e2c38" />
    <!-- Lab reagents & bottles on table -->
    <g transform="translate(460, 160)">
      <!-- Large container/bottle -->
      <rect x="0" y="50" width="50" height="70" fill="#104c7a" opacity="0.8" rx="5" />
      <rect x="15" y="35" width="20" height="15" fill="#f37021" rx="2" />
      <!-- Small Erlenmeyer flask -->
      <polygon points="120,120 150,120 140,70 130,70" fill="#ffffff" opacity="0.9" stroke="#90a4b7" stroke-width="3" />
      <rect x="131" y="60" width="8" height="10" fill="#1fa22e" />
      <!-- Blue bottle (reagent with blue caps)-->
      <rect x="200" y="60" width="40" height="60" fill="#509ed9" opacity="0.9" rx="4" />
      <rect x="205" y="50" width="30" height="10" fill="#0e4a7c" rx="1" />
      <!-- Reagents box with yellow color -->
      <rect x="300" y="70" width="90" height="50" fill="#fbc02d" rx="4" />
      <rect x="320" y="60" width="50" height="10" fill="#e5b026" />
    </g>
    <!-- Ceiling Fan & AC Unit Silhouettes in Lab -->
    <rect x="920" y="40" width="200" height="80" fill="#cfdce6" rx="12" stroke="#abbcc9" stroke-width="4" />
    <line x1="950" y1="120" x2="1100" y2="120" stroke="#cfdce6" stroke-width="12" stroke-linecap="round" />
  </g>

  <!-- 2. Midground - Glass Entrance Frame (Structural Doors) -->
  <!-- Outer Door Frame architrave -->
  <rect x="0" y="0" width="1200" height="900" fill="none" stroke="#d5e1eb" stroke-width="24" />
  <rect x="12" y="12" width="1176" height="876" fill="none" stroke="#aabcca" stroke-width="4" />

  <!-- Center vertical frame post separating the doors (white-grey) -->
  <rect x="585" y="12" width="30" height="876" fill="#f7fafc" stroke="#cfdbe5" stroke-width="2" />
  <!-- Left Side frame edge -->
  <rect x="12" y="12" width="28" height="876" fill="#eef2f6" stroke="#cfdbe5" stroke-width="1" />
  <!-- Right Side frame edge -->
  <rect x="1160" y="12" width="28" height="876" fill="#eef2f6" stroke="#cfdbe5" stroke-width="1" />

  <!-- 3. Glass Panes Reflection & Texture -->
  <!-- Left Glass Pane reflection highlights -->
  <rect x="40" y="24" width="545" height="852" fill="url(#glass-reflection)" opacity="0.75" />
  <!-- Right Glass Pane reflection highlights -->
  <rect x="615" y="24" width="545" height="852" fill="url(#glass-reflection)" opacity="0.75" />

  <!-- Glass horizontal safety stripes / frosted lines -->
  <line x1="40" y1="450" x2="585" y2="450" stroke="#ffffff" stroke-width="4" stroke-dasharray="20 15" opacity="0.4" />
  <line x1="615" y1="450" x2="1160" y2="450" stroke="#ffffff" stroke-width="4" stroke-dasharray="20 15" opacity="0.4" />

  <!-- 4. Foreground Stickers & Custom Signages (High Contrast & Sharp) -->

  <!-- LEFT DECAL: "SHIFT ME LEFT SIDEWAYS" -->
  <g transform="translate(260, 420)">
    <!-- Main Sticker Outer Circle -->
    <circle cx="0" cy="0" r="115" fill="#ffffff" stroke="#cbd5e1" stroke-width="3" />
    <circle cx="0" cy="0" r="105" fill="none" stroke="url(#sticker-border)" stroke-width="5" />
    
    <!-- Sticker text (Custom styled to match user logo sans-serif) -->
    <!-- Arrows (Left/Right) -->
    <path d="M -50,-55 L -85,-35 L -50,-15 Z" fill="#0e4a7c" />
    <line x1="-80" y1="-35" x2="60" y2="-35" stroke="#0e4a7c" stroke-width="14" stroke-linecap="round" />
    <path d="M 50,-55 L 85,-35 L 50,-15 Z" fill="#0e4a7c" />

    <!-- Cute cartoon stickman sliding left sideways -->
    <g transform="translate(0, 15) scale(0.9)">
      <!-- Head with smile -->
      <circle cx="-15" cy="-25" r="16" fill="none" stroke="#0e4a7c" stroke-width="5" />
      <circle cx="-20" cy="-28" r="2.5" fill="#0e4a7c" />
      <circle cx="-10" cy="-28" r="2.5" fill="#0e4a7c" />
      <path d="M -20,-17 Q -15,-12 -10,-17" fill="none" stroke="#0e4a7c" stroke-width="2.5" stroke-linecap="round" />

      <!-- Body / Torso (tilted slightly, shifting) -->
      <line x1="-15" y1="-9" x2="-8" y2="35" stroke="#0e4a7c" stroke-width="5.5" stroke-linecap="round" />
      
      <!-- Outstretched arms sliding along glass surface -->
      <path d="M -13,0 L -35,-15 L -55,-10" fill="none" stroke="#0e4a7c" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M -10,12 L 20,2 L 42,12" fill="none" stroke="#0e4a7c" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />

      <!-- Sliding Legs/Feet wide open -->
      <path d="M -8,35 L -35,65 L -55,60" fill="none" stroke="#0e4a7c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M -8,35 L 15,65 L 35,62" fill="none" stroke="#0e4a7c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />

      <!-- Sideways movement action lines -->
      <line x1="-80" y1="20" x2="-65" y2="20" stroke="#f37021" stroke-width="4.5" stroke-linecap="round" />
      <line x1="-75" y1="35" x2="-60" y2="35" stroke="#f37021" stroke-width="4.5" stroke-linecap="round" />
    </g>

    <!-- Top Text Arc / Bottom text labels -->
    <rect x="-95" y="65" width="190" height="26" rx="4" fill="#0e4a7c" />
    <text x="0" y="82" font-family="-apple-system, sans-serif" font-weight="900" font-size="12" fill="#ffffff" text-anchor="middle" letter-spacing="1.2">SHIFT ME LEFT</text>
    <text x="0" y="101" font-family="-apple-system, sans-serif" font-weight="800" font-size="10" fill="#0e4a7c" text-anchor="middle" letter-spacing="2">SIDEWAYS</text>
  </g>

  <!-- RIGHT DECAL: "SHIFT ME RIGHT SIDEWAYS" -->
  <g transform="translate(930, 420)">
    <!-- Main Sticker Outer Circle -->
    <circle cx="0" cy="0" r="115" fill="#ffffff" stroke="#cbd5e1" stroke-width="3" />
    <circle cx="0" cy="0" r="105" fill="none" stroke="url(#sticker-border)" stroke-width="5" />
    
    <!-- Sticker text -->
    <!-- Arrows (Left/Right) -->
    <path d="M -50,-55 L -85,-35 L -50,-15 Z" fill="#0e4a7c" />
    <line x1="-80" y1="-35" x2="60" y2="-35" stroke="#0e4a7c" stroke-width="14" stroke-linecap="round" />
    <path d="M 50,-55 L 85,-35 L 50,-15 Z" fill="#0e4a7c" />

    <!-- Cute cartoon stickman sliding right sideways -->
    <g transform="translate(0, 15) scale(0.9) scale(-1, 1)">
      <!-- Head with smile -->
      <circle cx="-15" cy="-25" r="16" fill="none" stroke="#0e4a7c" stroke-width="5" />
      <circle cx="-20" cy="-28" r="2.5" fill="#0e4a7c" />
      <circle cx="-10" cy="-28" r="2.5" fill="#0e4a7c" />
      <path d="M -20,-17 Q -15,-12 -10,-17" fill="none" stroke="#0e4a7c" stroke-width="2.5" stroke-linecap="round" />

      <!-- Body / Torso -->
      <line x1="-15" y1="-9" x2="-8" y2="35" stroke="#0e4a7c" stroke-width="5.5" stroke-linecap="round" />
      
      <!-- Outstretched arms sliding along glass surface -->
      <path d="M -13,0 L -35,-15 L -55,-10" fill="none" stroke="#0e4a7c" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M -10,12 L 20,2 L 42,12" fill="none" stroke="#0e4a7c" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />

      <!-- Sliding Legs/Feet wide open -->
      <path d="M -8,35 L -35,65 L -55,60" fill="none" stroke="#0e4a7c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M -8,35 L 15,65 L 35,62" fill="none" stroke="#0e4a7c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />

      <!-- Sideways movement action lines -->
      <line x1="-80" y1="20" x2="-65" y2="20" stroke="#f37021" stroke-width="4.5" stroke-linecap="round" />
      <line x1="-75" y1="35" x2="-60" y2="35" stroke="#f37021" stroke-width="4.5" stroke-linecap="round" />
    </g>

    <!-- Top Text Arc / Bottom text labels -->
    <rect x="-95" y="65" width="190" height="26" rx="4" fill="#0e4a7c" />
    <text x="0" y="82" font-family="-apple-system, sans-serif" font-weight="900" font-size="12" fill="#ffffff" text-anchor="middle" letter-spacing="1.1">SHIFT ME RIGHT</text>
    <text x="0" y="101" font-family="-apple-system, sans-serif" font-weight="800" font-size="10" fill="#0e4a7c" text-anchor="middle" letter-spacing="2">SIDEWAYS</text>
  </g>

  <!-- 5. SIGN: MEMBERS ONLY (RESTRICTION WARNING) -->
  <g transform="translate(625, 230)">
    <!-- Sheet of white printed paper with black text stuck to the glass -->
    <rect x="0" y="0" width="410" height="150" fill="#ffffff" rx="4" stroke="#c0cfdd" stroke-width="2" filter="drop-shadow(0px 8px 12px rgba(0,0,0,0.08))" />
    <!-- Blue/grey paper border style -->
    <line x1="15" y1="0" x2="15" y2="150" stroke="#cbd5e1" stroke-width="1.5" />
    <line x1="395" y1="0" x2="395" y2="150" stroke="#cbd5e1" stroke-width="1.5" />

    <!-- Big Warning Header -->
    <text x="35" y="45" font-family="-apple-system, sans-serif" font-weight="900" font-size="20" fill="#0c2340" letter-spacing="0.5">STL Members Only —</text>
    <text x="35" y="75" font-family="-apple-system, sans-serif" font-weight="900" font-size="20" fill="#d32f2f" letter-spacing="0.5">No Entry for Unauthorized</text>
    <text x="35" y="105" font-family="-apple-system, sans-serif" font-weight="900" font-size="20" fill="#d32f2f" letter-spacing="0.5">Personnel</text>
    
    <!-- Clean footnote decoration line -->
    <rect x="35" y="125" width="340" height="4" fill="#f37021" rx="2" />
  </g>

  <!-- 6. Bottom Physical Lab Information Overlay with time stamp -->
  <rect x="12" y="810" width="1176" height="78" fill="rgba(12, 35, 64, 0.85)" rx="0" stroke="none" />
  <text x="45" y="855" font-family="-apple-system, sans-serif" font-weight="700" font-size="16" fill="#ffffff" letter-spacing="1">SUSTAINABLE TECHNOLOGIES LABORATORY • IIT INDORE</text>
  <text x="1155" y="855" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="15" fill="#f37021" text-anchor="end" letter-spacing="0.5">ESTD. 2018 | IN SERVICE</text>
</svg>
